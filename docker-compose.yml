services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # NEWSAPI_KEY and GUARDIAN_KEY are read from a .env file at the repo root (never committed).
      # See .env.example for the full list of required variables.
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - GUARDIAN_KEY=${GUARDIAN_KEY}
      # ML service: "ml-service" resolves within the Docker network via embedded DNS.
      - ML_SERVICE_URL=http://ml-service:8001
      # Database: Supabase hosted Postgres. Connection string is in .env as SUPABASE_DATABASE_URL.
      # The backend reads DATABASE_URL — it doesn't know or care whether that points to
      # a local container or Supabase's hosted instance.
      - DATABASE_URL=${SUPABASE_DATABASE_URL}
      # Supabase JWT secret for verifying tokens on the Go backend (Phase 12).
      # Find this in Supabase dashboard → Settings → API → JWT Secret.
      # Never expose this value to the frontend or commit it to git.
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      # LLM API key for OpenAI connection explanations (Phase 15).
      # If unset, connections render without explanation text — graceful degradation.
      - LLM_API_KEY=${LLM_API_KEY}
    depends_on:
      ml-service:
        # Wait until ml-service passes its healthcheck before starting the backend.
        # Without this, the startup goroutine could call /analyze before models load.
        condition: service_healthy
    restart: unless-stopped

  ml-service:
    build:
      context: ./ml-service
    ports:
      - "8001:8001"
    environment:
      # PIN PORT so the $PORT shell expansion in CMD lands on the same port
      # docker-compose maps externally. Railway overrides this automatically.
      - PORT=8001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      # VITE_* vars must be passed as build args, not runtime environment vars.
      # Vite bakes them into the JS bundle at build time — they are not read at
      # runtime. The Dockerfile declares matching ARG statements for each one.
      args:
        - VITE_API_BASE_URL=http://localhost:8080
        - VITE_SUPABASE_URL=${SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    ports:
      # nginx listens on $PORT (set to 80 below); map to 5173 externally so
      # existing dev bookmarks (localhost:5173) still work.
      - "5173:80"
    environment:
      # PORT tells nginx.conf.template which port to listen on locally.
      # Railway overrides this with its own dynamically assigned port.
      - PORT=80
    depends_on:
      - backend
    restart: unless-stopped

# All services share this network. Service names resolve as hostnames:
#   backend    → http://backend:8080
#   ml-service → http://ml-service:8001
#   frontend   → http://frontend:5173 (served to browser via localhost:5173)
networks:
  default:
    name: olds-network
